name: Run Behave Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "PWD: $PWD"
          echo "Workspace: ${{ github.workspace }}"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Firefox
        run: |
          sudo apt update
          sudo apt install -y wget tar xz-utils curl
          wget -O firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US"
          tar -xf firefox.tar.xz
          sudo mv firefox /opt/firefox
          sudo ln -sf /opt/firefox/firefox /usr/local/bin/firefox
          firefox --version


      - name: Install GeckoDriver
        run: |
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep '"tag_name"' | awk -F'"' '{print $4}')
          wget -q "https://github.com/mozilla/geckodriver/releases/download/$GECKO_VERSION/geckodriver-$GECKO_VERSION-linux64.tar.gz"
          tar -xzf geckodriver-*-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver
          geckodriver --version


          firefox --version
          geckodriver --version


      - name: Remove old venv if exists
        run: rm -rf "${{ github.workspace }}/venv"

      - name: Create virtual environment
        run: |
          python -m venv "${{ github.workspace }}/venv"
          ls -la "${{ github.workspace }}/venv/bin"

      

      - name: Install Python dependencies
        run: |
          "${{ github.workspace }}/venv/bin/pip3" install --upgrade pip
          "${{ github.workspace }}/venv/bin/pip3" install -r requirements.txt

      - name: Install Launchable CLI
        run: |
          "${{ github.workspace }}/venv/bin/pip3" install --upgrade launchable

      - name: Run Behave tests (force JUnit XML)
        run: |
          mkdir -p reports
          "${{ github.workspace }}/venv/bin/python3" -m behave \
            --format junit \
            --outfile reports/results.xml \
            features/

      - name: Debug reports folder
        run: |
          echo "Reports directory content:"
          ls -R "${{ github.workspace }}/reports"

      - name: Launchable record build
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          "${{ github.workspace }}/venv/bin/python3" -m launchable record build --name "$GITHUB_SHA"

      - name: Launchable record tests
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          "${{ github.workspace }}/venv/bin/python3" -m launchable record tests junit \
            --base reports \
            reports/results.xml
