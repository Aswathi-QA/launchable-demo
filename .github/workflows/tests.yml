name: Run Behave Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (Firefox + GeckoDriver)
        run: |
          sudo add-apt-repository ppa:mozillateam/ppa -y
          echo '
          Package: *
          Pin: release o=LP-PPA-mozillateam
          Pin-Priority: 1001
          ' | sudo tee /etc/apt/preferences.d/mozilla-firefox
          sudo apt update
          sudo apt install -y firefox firefox-geckodriver

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Launchable CLI (pip)
        run: |
          pip install --upgrade launchable
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Launchable version
        run: launchable --version

      - name: Run Behave tests
        run: |
          python -m behave features/ --junit --junit-directory reports

      - name: List reports
        run: ls -R reports

      - name: Launchable record build
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable record build --name "$GITHUB_SHA"

      - name: Launchable record tests
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable record tests --source reports
