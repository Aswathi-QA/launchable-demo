name: Run Behave Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "PWD is: $PWD"
          echo "Workspace is: ${{ github.workspace }}"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Firefox + GeckoDriver (Ubuntu 24.04 safe)
        run: |
          sudo apt update
          sudo apt install -y wget tar xz-utils

          # Install Firefox from Mozilla tarball (no snap)
          wget -O firefox.tar.bz2 "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US"
          tar -xjf firefox.tar.bz2
          sudo mv firefox /opt/firefox
          sudo ln -sf /opt/firefox/firefox /usr/local/bin/firefox

          # Install GeckoDriver
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep tag_name | cut -d '"' -f 4)
          wget -q "https://github.com/mozilla/geckodriver/releases/download/$GECKO_VERSION/geckodriver-$GECKO_VERSION-linux64.tar.gz"
          tar -xzf geckodriver-*-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

          # Verify
          firefox --version
          geckodriver --version

      - name: Create virtual environment
        run: |
          python -m venv "${{ github.workspace }}/venv"
          ls -la "${{ github.workspace }}/venv"

      - name: Install Python dependencies
        run: |
          "${{ github.workspace }}/venv/bin/pip" install --upgrade pip
          "${{ github.workspace }}/venv/bin/pip" install -r requirements.txt

      - name: Install Launchable CLI
        run: |
          "${{ github.workspace }}/venv/bin/pip" install --upgrade launchable

      - name: Verify Launchable version
        run: |
          "${{ github.workspace }}/venv/bin/python" -m launchable --version

      - name: Run Behave tests
        run: |
          "${{ github.workspace }}/venv/bin/python" -m behave features/ --junit --junit-directory reports

      - name: List reports
        run: ls -R reports

      - name: Launchable record build
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          "${{ github.workspace }}/venv/bin/python" -m launchable record build --name "$GITHUB_SHA"

      - name: Launchable record tests
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          "${{ github.workspace }}/venv/bin/python" -m launchable record tests junit --base reports reports/*.xml
