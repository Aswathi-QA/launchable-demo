name: Run Behave Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "PWD: $PWD"
          echo "Workspace: ${{ github.workspace }}"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Firefox + GeckoDriver (Ubuntu 24.04 safe)
        run: |
          sudo apt update
          sudo apt install -y wget tar xz-utils curl

          wget -O firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US"
          tar -xf firefox.tar.xz
          sudo mv firefox /opt/firefox
          sudo ln -sf /opt/firefox/firefox /usr/local/bin/firefox

          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep tag