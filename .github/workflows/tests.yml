name: Run Behave Tests with Launchable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout with full history (fixes Smart Tests warning)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install launchable

      - name: Record build in Launchable
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable record build --name github-actions-${{ github.run_id }}

      - name: Run Behave tests and generate JUnit report
        run: |
          mkdir -p reports
          behave --junit --junit-directory reports

      - name: Launchable record tests
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable record tests behave reports/*.xml