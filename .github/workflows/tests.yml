name: BDD Tests with Launchable (Record Phase)

on:
  push:
  workflow_dispatch:

jobs:
  bdd-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ✅ Record build in Launchable
      - name: Record build in Launchable
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable record build --name github-actions-${{ github.run_id }}

      # ✅ Run Behave and generate JUnit XML (CORRECT)
      - name: Run Behave tests and generate report
        run: |
          mkdir -p reports
          behave --junit --junit-directory reports
                  
      # ✅ Run risk-based subset of tests (Prediction mode)
      
      - name: Run subset of tests using Launchable
        env:
          LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
        run: |
          launchable subset \
            --target 50% \
            --get-tests-from-previous-sessions \
            behave

      # ✅ Upload reports to Launchable
